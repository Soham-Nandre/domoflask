```yaml
name: CI/CD Pipeline for Flask Application

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Python environment and dependencies
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Run Tests (Ensure the database is simulated for testing)
      - name: Run tests
        env:
          MYSQL_HOST: localhost
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_DB: test_db
        run: |
          source venv/bin/activate
          # Assume the app has test scripts or can be tested manually
          python -m unittest discover

      # Package the artifact for deployment
      - name: Generate deployment artifact
        run: |
          mkdir -p build
          cp -r app.py requirements.txt build/
          cp -r templates build/templates/  # Include templates if they exist
          cp -r static build/static/        # Include static files if they exist
          echo "Deployment artifact created."

      # Upload the artifact for later deployment
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: flask-app-artifact
          path: build/

  deploy:
    name: Deploy Application
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Download the artifact created in the build step
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: flask-app-artifact
          path: build/

      # Establish SSH connection
      - name: Establish SSH connection
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo SSH connection successful"

      # Transfer artifact to VM
      - name: Transfer artifact to VM
        run: |
          scp -i ~/.ssh/id_rsa -r build/* ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/flask-app/

      # Deploy application on VM
      - name: Deploy Application
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
          set -e
          echo "Starting deployment on VM..."

          # Ensure deployment directory exists
          mkdir -p /home/${{ secrets.VM_USER }}/flask-app

          # Install Python and dependencies if missing
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip

          # Set up virtual environment for Flask application
          cd /home/${{ secrets.VM_USER }}/flask-app
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          # Ensure MySQL is installed and configured
          if ! command -v mysql >/dev/null; then
            sudo apt-get install -y mysql-server
          fi

          # Set up MySQL database
          sudo mysql -u root <<MYSQL_SETUP
          CREATE DATABASE IF NOT EXISTS ${MYSQL_DB};
          CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
          GRANT ALL ON ${MYSQL_DB}.* TO '${MYSQL_USER}'@'%';
          FLUSH PRIVILEGES;
MYSQL_SETUP

          # Restart MySQL for changes to take effect
          sudo systemctl restart mysql

          # Start the Flask application
          nohup python app.py > flask-app.log 2>&1 &
          echo "Application deployed and started successfully!"
EOF
```