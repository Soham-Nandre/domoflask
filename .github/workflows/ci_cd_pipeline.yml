```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Create a virtual environment
      - name: Create Python Virtual Environment
        run: python3 -m venv venv

      # Install dependencies
      - name: Install Dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Run tests
      - name: Run Tests
        run: |
          source venv/bin/activate
          python -m unittest discover -s tests

      # Package application as an artifact for deployment
      - name: Prepare Artifact for Deployment
        run: |
          mkdir -p build
          cp -r app.py venv requirements.txt build/
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: build
          path: build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Download artifact
      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: build
          path: build

      # Set up SSH
      - name: Establish SSH Connection
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo SSH connection successful"

      # Transfer artifact to VM
      - name: Transfer Artifact to VM
        run: |
          scp -i ~/.ssh/id_rsa -r build/* ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/app/

      # Deploy application on VM
      - name: Deploy Application
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ secrets.MYSQL_DB }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
          set -e
          echo "Starting deployment on VM..."

          # Create deployment directory if it doesn't exist
          mkdir -p /home/${{ secrets.VM_USER }}/app

          # Stop existing application process if running
          pkill -f "python app.py" || echo "No existing app process running"

          # Enter deployment directory
          cd /home/${{ secrets.VM_USER }}/app

          # Set up Python virtual environment
          python3 -m venv venv
          source venv/bin/activate

          # Install dependencies
          pip install --upgrade pip
          pip install -r requirements.txt

          # Export environment variables for database connection
          export MYSQL_HOST=${{ secrets.MYSQL_HOST }}
          export MYSQL_USER=${{ secrets.MYSQL_USER }}
          export MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          export MYSQL_DB=${{ secrets.MYSQL_DB }}

          # Ensure the database table is created
          python -c "
import os
from flask_mysqldb import MySQL
from flask import Flask

app = Flask(__name__)
app.config['MYSQL_HOST'] = os.environ['MYSQL_HOST']
app.config['MYSQL_USER'] = os.environ['MYSQL_USER']
app.config['MYSQL_PASSWORD'] = os.environ['MYSQL_PASSWORD']
app.config['MYSQL_DB'] = os.environ['MYSQL_DB']
mysql = MySQL(app)

with app.app_context():
    conn = mysql.connection.cursor()
    conn.execute('''
CREATE TABLE IF NOT EXISTS messages (
    id INT AUTO_INCREMENT PRIMARY KEY,
    message TEXT
);
''')
    mysql.connection.commit()
"

          # Start application
          nohup python app.py > app.log 2>&1 &
          echo "Application started successfully!"
EOF
``` 