
name: Deploy Flask Application to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3                     

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt

    - name: Generate deployment artifact
      run: |
        mkdir -p artifact
        cp -r app.py requirements.txt templates/  artifact/

    - name: Add SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Add VM to known hosts
      run: |
        ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

    - name: Transfer artifact to VM
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "mkdir -p /home/${{ secrets.VM_USER }}/app"
        scp -i ~/.ssh/id_rsa -r artifact/. ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USER }}/app/

    - name: Deploy application on VM
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << EOF
        # Ensure necessary directories exist
        mkdir -p ~/.ssh ~/app
        chmod 700 ~/.ssh

        # Kill existing app process if running
        pkill -f "python app.py" || true

        # Set up Python virtual environment
        python3 -m venv ~/app/venv
        source ~/app/venv/bin/activate
        pip install --upgrade pip
        pip install -r ~/app/requirements.txt

        # Set environment variables
        export MYSQL_HOST="${{ secrets.MYSQL_HOST }}"
        export MYSQL_USER="${{ secrets.MYSQL_USER }}"
        export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
        export MYSQL_DB="${{ secrets.MYSQL_DB }}"

        # Initialize database
        python -c "import app;app.init_db()"

        # Start the Flask application
        nohup python ~/app/app.py > ~/app/app.log 2>&1 &
        EOF

